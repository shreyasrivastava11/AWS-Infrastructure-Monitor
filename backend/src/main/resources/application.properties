spring.application.name=aws-infra-monitor
server.port=8080

# AWS Credentials - replace with your actual credentials or use environment variables
aws.accessKeyId=${AWS_ACCESS_KEY_ID:your-access-key-here}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:your-secret-key-here}
aws.region=${AWS_REGION:us-east-1}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
